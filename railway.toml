[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Runs in the new container before traffic is shifted — safe for migrations
releaseCommand = "npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma"
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
