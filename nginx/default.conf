# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name proxoria.com www.proxoria.com api.proxoria.com;
    return 301 https://$host$request_uri;
}

# Frontend — proxoria.com
server {
    listen 443 ssl;
    server_name proxoria.com www.proxoria.com;

    ssl_certificate     /etc/letsencrypt/live/proxoria.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/proxoria.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# API — api.proxoria.com
server {
    listen 443 ssl;
    server_name api.proxoria.com;

    ssl_certificate     /etc/letsencrypt/live/api.proxoria.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.proxoria.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
