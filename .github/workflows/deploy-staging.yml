name: Deploy — Staging

on:
  push:
    branches: [dev]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/proxoria-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/proxoria-web

jobs:
  # ─── CI gate ────────────────────────────────────────────────────────────────
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/ai_gateway"

      - run: npm run lint
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ai_gateway_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Run migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/ai_gateway_test"

      - run: npm run test
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/ai_gateway_test"
          NODE_ENV: test

  # ─── Build & push staging images (tagged :staging) ──────────────────────────
  build-and-push:
    needs: [lint-and-build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_API }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ${{ env.IMAGE_WEB }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max
